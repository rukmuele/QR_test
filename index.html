<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS1対応バーコードスキャナー</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: sans-serif; margin: 10px; background: #f0f4f8; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        video { width: 100%; min-height: 250px; background: #000; margin-bottom: 15px; border-radius: 4px; object-fit: cover; }
        .btn { padding: 12px 24px; font-size: 16px; font-weight: bold; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .btn-start { background-color: #007bff; }
        .btn-stop { background-color: #dc3545; }
        .btn:disabled { background-color: #6c757d; cursor: not-allowed; opacity: 0.7; }
        #log-area { margin-top: 15px; text-align: left; max-height: 200px; overflow-y: auto; background: #f8f9fa; padding: 10px; border: 1px solid #dee2e6; font-family: monospace; font-size: 14px; }
        .log-item { border-bottom: 1px dashed #ccc; padding: 4px 0; }
        .success-text { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>GS1対応スキャナー</h2>
    <video id="camera-video"></video>
    <div>
        <button id="btn-start" class="btn btn-start">スキャン開始</button>
        <button id="btn-stop" class="btn btn-stop" disabled>スキャン停止</button>
    </div>
    <div id="log-area"></div>
</div>

<script>
(() => {
    'use strict';

    // GS1対応のためにフォーマットを明示
    const hints = new Map([
        [ZXing.DecodeHintType.POSSIBLE_FORMATS, [
            ZXing.BarcodeFormat.QR_CODE,
            ZXing.BarcodeFormat.DATA_MATRIX,
            ZXing.BarcodeFormat.CODE_128
        ]],
        [ZXing.DecodeHintType.TRY_HARDER, true]
    ]);

    const state = {
        codeReader: new ZXing.BrowserMultiFormatReader(hints),
        audioContext: null,
        lastScannedText: '',
        lastScannedTime: 0,
        cooldownMs: 1500
    };

    const parseGS1 = (text) => {
        // FNC1 (ASCII 29) を置換して可視化
        return text.replace(/\x1D/g, ')(');
    };

    const playSuccessSound = () => {
        if (!state.audioContext) state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = state.audioContext;
        [587.33, 880.00].forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.15));
            gain.gain.setValueAtTime(0.3, ctx.currentTime + (i * 0.15));
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (i * 0.15) + 0.15);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(ctx.currentTime + (i * 0.15));
            osc.stop(ctx.currentTime + (i * 0.15) + 0.15);
        });
    };

    const stopScanner = () => {
        state.codeReader.reset();
        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-stop').disabled = true;
    };

    const handleScanSuccess = (decodedText) => {
        const now = Date.now();
        if (decodedText === state.lastScannedText && (now - state.lastScannedTime) < state.cooldownMs) return;

        state.lastScannedText = decodedText;
        state.lastScannedTime = now;
        playSuccessSound();

        const formatted = parseGS1(decodedText);
        const logArea = document.getElementById('log-area');
        logArea.insertAdjacentHTML('afterbegin', `<div class="log-item">${new Date().toLocaleTimeString()} : <span class="success-text">${formatted}</span></div>`);
    };

    const startScanner = async () => {
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-stop').disabled = false;
        
        const constraints = {
            video: {
                facingMode: { ideal: 'environment' },
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        try {
            await state.codeReader.decodeFromConstraints(constraints, document.getElementById('camera-video'), (result, err) => {
                if (result) handleScanSuccess(result.getText());
            });
        } catch (err) {
            console.error(err);
            alert(`起動エラー: ${err}`);
            stopScanner();
        }
    };

    document.getElementById('btn-start').addEventListener('click', startScanner);
    document.getElementById('btn-stop').addEventListener('click', stopScanner);
})();
</script>
</body>
</html>

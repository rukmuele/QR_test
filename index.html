<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイクロQRスキャナー</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: sans-serif; margin: 10px; background: #f0f4f8; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        video { width: 100%; min-height: 250px; background: #000; margin-bottom: 15px; border-radius: 4px; object-fit: cover; }
        .btn { padding: 12px 24px; font-size: 16px; font-weight: bold; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .btn-start { background-color: #007bff; }
        .btn-stop { background-color: #dc3545; }
        .btn:disabled { background-color: #6c757d; cursor: not-allowed; opacity: 0.7; }
        #log-area { margin-top: 15px; text-align: left; max-height: 200px; overflow-y: auto; background: #f8f9fa; padding: 10px; border: 1px solid #dee2e6; font-family: monospace; font-size: 14px; }
        .log-item { border-bottom: 1px dashed #ccc; padding: 4px 0; }
        .success-text { color: #28a745; font-weight: bold; }
        .error-text { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>マイクロQRスキャナー</h2>
    <video id="camera-video"></video>
    <div>
        <button id="btn-start" class="btn btn-start">スキャン開始</button>
        <button id="btn-stop" class="btn btn-stop" disabled>スキャン停止</button>
    </div>
    <div id="log-area"></div>
</div>

<script>
(() => {
    'use strict';

    const state = {
        codeReader: new ZXing.BrowserMultiFormatReader(),
        audioContext: null,
        lastScannedText: '',
        lastScannedTime: 0,
        cooldownMs: 1000
    };

    // 音声出力用ヘルパー関数
    const playSound = (type) => {
        if (!state.audioContext) state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = state.audioContext;

const playSound = (type) => {
    // AudioContextの初期化
    if (!state.audioContext) {
        state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    const ctx = state.audioContext;

    // 音を作るヘルパー関数（カプセル化）
    const createTone = (freq, start, duration, type = 'sine') => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        
        gain.gain.setValueAtTime(0.3, start);
        gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.start(start);
        osc.stop(start + duration);
    };

    if (type === 'success') {
        // ピンポン：高い音を短く2回、後半を少し高く
        createTone(587.33, ctx.currentTime, 0.15); // D5
        createTone(880.00, ctx.currentTime + 0.15, 0.3); // A5
    } else {
        // ブブー：低い音を少し引きずるように
        createTone(110.00, ctx.currentTime, 0.5, 'sawtooth'); // A2
    }
};
        
    const handleScanSuccess = (decodedText) => {
        const now = Date.now();
        if (decodedText === state.lastScannedText && (now - state.lastScannedTime) < state.cooldownMs) return;

        state.lastScannedText = decodedText;
        state.lastScannedTime = now;

        const isPattern1 = (decodedText.charAt(3) === '1');
        
        // 音を鳴らす
        playSound(isPattern1 ? 'success' : 'error');
        
        const logArea = document.getElementById('log-area');
        const status = isPattern1 ? '<span class="success-text">[4桁目：1]</span>' : '<span class="error-text">[4桁目：1以外]</span>';
        logArea.insertAdjacentHTML('afterbegin', `<div class="log-item">${new Date().toLocaleTimeString()} : ${status} ${decodedText}</div>`);
    };

    const startScanner = async () => {
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-stop').disabled = false;

        const videoEl = document.getElementById('camera-video');
        
        try {
            const videoInputDevices = await state.codeReader.listVideoInputDevices();
            const selectedDeviceId = videoInputDevices.find(device => /back|rear|environment/i.test(device.label))?.deviceId || videoInputDevices[0].deviceId;

            await state.codeReader.decodeFromVideoDevice(selectedDeviceId, videoEl, (result, err) => {
                if (result) {
                    const text = result.getText();
                    if (text && text.length > 3) {
                        handleScanSuccess(text);
                    }
                }
            });
        } catch (err) {
            console.error(err);
            alert(`起動エラー: ${err}`);
            stopScanner();
        }
    };

    const stopScanner = () => {
        state.codeReader.reset();
        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-stop').disabled = true;
    };

    document.getElementById('btn-start').addEventListener('click', startScanner);
    document.getElementById('btn-stop').addEventListener('click', stopScanner);
})();
</script>

</body>
</html>

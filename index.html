<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マルチバーコードスキャナー</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: sans-serif; margin: 10px; background: #f0f4f8; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        video { width: 100%; min-height: 250px; background: #000; margin-bottom: 15px; border-radius: 4px; object-fit: cover; }
        .btn { padding: 12px 24px; font-size: 16px; font-weight: bold; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .btn-start { background-color: #007bff; }
        .btn-stop { background-color: #dc3545; }
        .btn:disabled { background-color: #6c757d; cursor: not-allowed; opacity: 0.7; }
        #log-area { margin-top: 15px; text-align: left; max-height: 200px; overflow-y: auto; background: #f8f9fa; padding: 10px; border: 1px solid #dee2e6; font-family: monospace; font-size: 14px; }
        .log-item { border-bottom: 1px dashed #ccc; padding: 4px 0; }
        .success-text { color: #28a745; font-weight: bold; }
        .error-text { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>マルチバーコードスキャナー</h2>
    <video id="camera-video"></video>
    <div>
        <button id="btn-start" class="btn btn-start">スキャン開始</button>
        <button id="btn-stop" class="btn btn-stop" disabled>スキャン停止</button>
    </div>
    <div id="log-area"></div>
</div>

<script>
(() => {
    'use strict';

    const hints = new Map([
        [ZXing.DecodeHintType.POSSIBLE_FORMATS, [
            ZXing.BarcodeFormat.QR_CODE,
            ZXing.BarcodeFormat.MICRO_QR_CODE,
            ZXing.BarcodeFormat.DATA_MATRIX,
            ZXing.BarcodeFormat.CODE_128
        ]],
        [ZXing.DecodeHintType.TRY_HARDER, true]
    ]);

    const state = {
        codeReader: new ZXing.BrowserMultiFormatReader(hints),
        audioContext: null,
        lastScannedText: '',
        lastScannedTime: 0,
        cooldownMs: 1500
    };

    const playSound = (isSuccess) => {
        if (!state.audioContext) state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = state.audioContext;
        if (isSuccess) {
            // ピンポン音
            [587.33, 880.00].forEach((f, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.15);
                gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.15);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(ctx.currentTime + i * 0.15); osc.stop(ctx.currentTime + i * 0.15 + 0.15);
            });
        } else {
            // エラー音
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(110.00, ctx.currentTime);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        }
    };

    const handleScan = (result) => {
        const text = result.getText();
        const format = result.getBarcodeFormat();
        const now = Date.now();

        if (text === state.lastScannedText && (now - state.lastScannedTime) < state.cooldownMs) return;
        state.lastScannedText = text;
        state.lastScannedTime = now;

        const isMicroQR = (format === ZXing.BarcodeFormat.MICRO_QR_CODE);
        let isSuccess = true;
        let displayType = "GS1/その他";

        if (isMicroQR) {
            displayType = "MicroQR";
            isSuccess = (text.charAt(3) === '1');
            playSound(isSuccess);
        } else {
            // GS1等の場合は無条件で成功音
            playSound(true);
        }

        const logArea = document.getElementById('log-area');
        const colorClass = isSuccess ? 'success-text' : 'error-text';
        logArea.insertAdjacentHTML('afterbegin', `<div class="log-item">${new Date().toLocaleTimeString()} [${displayType}] : <span class="${colorClass}">${text.replace(/\x1D/g, ')(')}</span></div>`);
    };

    const startScanner = async () => {
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-stop').disabled = false;
        try {
            await state.codeReader.decodeFromConstraints({
                video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
            }, document.getElementById('camera-video'), (result, err) => {
                if (result) handleScan(result);
            });
        } catch (err) { alert(err); }
    };

    document.getElementById('btn-start').addEventListener('click', startScanner);
    document.getElementById('btn-stop').addEventListener('click', () => { state.codeReader.reset(); document.getElementById('btn-start').disabled = false; document.getElementById('btn-stop').disabled = true; });
})();
</script>
</body>
</html>

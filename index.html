<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>マイクロバーコード スキャナー</title>
<script type="text/javascript" nonce="93a8d812a08c420ab17ccae7a43" src="//local.adguard.org?ts=1782909595377&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_00000000f9e07209947705b40bcc369a%26fn%3Dmicro_barcode_scanner_latest.html%26cd%3Dattachment%26ts%3D495253%26p%3Dfs%26cid%3D1%26sig%3D095d2682954e15270c67ba5cc6eb4366491f699ef7a8688335df8d9a4b98bb59%26v%3D0&amp;app=chrome.exe&amp;css=3&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1"></script><script type="text/javascript" nonce="93a8d812a08c420ab17ccae7a43" src="//local.adguard.org?ts=1782909595377&amp;name=AdGuard%20Extra&amp;name=AdGuard%20Popup%20Blocker&amp;type=user-script"></script><script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
body{font-family:sans-serif;background:#f0f4f8;margin:10px;text-align:center}
.container{max-width:520px;margin:auto;background:#fff;padding:15px;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,.1)}
#reader{width:100%;min-height:260px;background:#000}
button{padding:10px 20px;margin:5px}
#log{margin-top:12px;text-align:left;max-height:180px;overflow:auto;border:1px solid #ccc;padding:8px;font-family:monospace}
.ok{color:#198754;font-weight:bold}.ng{color:#dc3545;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h2>連続スキャナー</h2>
<div id="reader"></div>
<button id="start">開始</button>
<button id="stop" disabled>停止</button>
<div id="log"></div>
</div>
<script>
(()=>{
const st={qr:null,ctx:null,last:"",time:0,cool:2000};
const beep=(f,t,d)=>{st.ctx??=new(window.AudioContext||window.webkitAudioContext)();const c=st.ctx,o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(1,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}
const ok=()=>beep(880,"sine",.15),ng=()=>beep(220,"sawtooth",.3);
const log=(txt,flag)=>document.querySelector("#log").insertAdjacentHTML("afterbegin",`<div>${new Date().toLocaleTimeString()} ${flag?'<span class="ok">OK</span>':'<span class="ng">NG</span>'} ${txt}</div>`);
const scan=txt=>{const n=Date.now();if(txt===st.last&&n-st.time<st.cool)return;st.last=txt;st.time=n;const f=txt.charAt(3)==="1";f?ok():ng();log(txt,f);}
async function backId(){
 await navigator.mediaDevices.getUserMedia({video:true}).then(s=>s.getTracks().forEach(t=>t.stop()));
 const cams=await Html5Qrcode.getCameras();
 const keys=["back","rear","environment","背面","後","wide","ultra"];
 const hit=cams.find(c=>keys.some(k=>(c.label||"").toLowerCase().includes(k)));
 return {id:(hit||cams[cams.length-1]||cams[0]).id,cams};
}
async function start(){
 document.start.disabled=true;document.stop.disabled=false;
 st.ctx??=new(window.AudioContext||window.webkitAudioContext)();await st.ctx.resume();
 st.qr=new Html5Qrcode("reader");
 const cfg={fps:15,qrbox:{width:260,height:120}};
 try{
  const {id}=await backId();
  await st.qr.start(id,cfg,scan);
 }catch(e){
  try{
   await st.qr.start({facingMode:{exact:"environment"}},cfg,scan);
  }catch{
   await st.qr.start({facingMode:"environment"},cfg,scan);
  }
 }
}
async function stop(){
 if(st.qr){await st.qr.stop();await st.qr.clear();}
 document.start.disabled=false;document.stop.disabled=true;
}
document.querySelector("#start").onclick=start;
document.querySelector("#stop").onclick=stop;
})();
</script>
</body>
</html>
